services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      args:
        HF_MODEL_ID: ${HF_MODEL_ID:?Set HF_MODEL_ID in .env (Hugging Face repo id)}
        HF_TOKEN: ${HF_TOKEN:-}
    environment:
      MODEL_DIR: /opt/model
      DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY:-}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost,http://127.0.0.1,http://localhost:80,http://127.0.0.1:80,http://localhost:5173,http://127.0.0.1:5173}
    ports:
      - "8000:8000"
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health').read()",
        ]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "80:80"
    depends_on:
      backend:
        condition: service_healthy
