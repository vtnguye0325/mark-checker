name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend-lint:
    name: Backend – Lint
    runs-on: [self-hosted, local]
    steps:
      - uses: actions/checkout@v4

      - name: Set up virtualenv
        run: |
          python3 -m venv backend/.venv
          backend/.venv/bin/pip install --quiet --upgrade pip
          backend/.venv/bin/pip install --quiet ruff

      - name: Lint
        run: backend/.venv/bin/ruff check backend/

      - name: Format check
        run: backend/.venv/bin/ruff format --check backend/

  backend-test:
    name: Backend – Unit Tests
    runs-on: [self-hosted, local]
    steps:
      - uses: actions/checkout@v4

      - name: Set up virtualenv
        run: |
          python3 -m venv backend/.venv
          backend/.venv/bin/pip install --quiet --upgrade pip
          backend/.venv/bin/pip install --quiet fastapi uvicorn httpx pytest pytest-asyncio slowapi python-multipart nltk openai

      - name: Run unit tests (no model required)
        run: backend/.venv/bin/pytest tests/test_text_formatter.py -v
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}

  frontend-build:
    name: Frontend – Build
    runs-on: [self-hosted, local]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: frontend

      - name: Build
        run: npm run build
        working-directory: frontend

  deploy:
    name: Deploy to Production
    runs-on: [self-hosted, local]
    needs: [backend-lint, backend-test, frontend-build]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    env:
      DOCKER_HOST: unix:///home/vtnguye/.docker/desktop/docker.sock
      HF_MODEL_ID: ${{ secrets.HF_MODEL_ID }}
      HF_TOKEN: ${{ secrets.HF_TOKEN }}
      DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
    steps:
      - uses: actions/checkout@v4

      - name: Build images
        run: docker compose build

      - name: Deploy
        run: docker compose up -d --remove-orphans

      - name: Wait for healthy
        run: |
          echo "Waiting for backend to be healthy..."
          for i in $(seq 1 24); do
            STATUS=$(docker compose ps --format json | python3 -c "import sys,json; [print(s['Health']) for line in sys.stdin for s in [json.loads(line)] if s.get('Service') == 'backend']" 2>/dev/null || echo "starting")
            echo "  attempt $i: $STATUS"
            [ "$STATUS" = "healthy" ] && exit 0
            sleep 5
          done
          echo "Backend did not become healthy in time"
          docker compose logs backend --tail 50
          exit 1
