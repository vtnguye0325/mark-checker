name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend-lint:
    name: Backend – Lint
    runs-on: [self-hosted, local]
    steps:
      - uses: actions/checkout@v4

      - name: Set up virtualenv
        run: |
          python3 -m venv backend/.venv
          backend/.venv/bin/pip install --quiet --upgrade pip
          backend/.venv/bin/pip install --quiet ruff

      - name: Lint
        run: backend/.venv/bin/ruff check backend/

      - name: Format check
        run: backend/.venv/bin/ruff format --check backend/

  backend-test:
    name: Backend – Unit Tests
    runs-on: [self-hosted, local]
    steps:
      - uses: actions/checkout@v4

      - name: Set up virtualenv
        run: |
          python3 -m venv backend/.venv
          backend/.venv/bin/pip install --quiet --upgrade pip
          backend/.venv/bin/pip install --quiet fastapi uvicorn httpx pytest pytest-asyncio slowapi python-multipart nltk openai

      - name: Run unit tests (no model required)
        run: backend/.venv/bin/pytest tests/test_text_formatter.py -v
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}

  frontend-build:
    name: Frontend – Build
    runs-on: [self-hosted, local]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: frontend

      - name: Build
        run: npm run build
        working-directory: frontend

  docker-build:
    name: Docker – Build Images
    runs-on: [self-hosted, local]
    needs: [backend-lint, backend-test, frontend-build]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build backend image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: false
          tags: trademark-backend:${{ github.sha }}
          cache-from: type=local,src=/tmp/docker-cache/backend
          cache-to: type=local,dest=/tmp/docker-cache/backend,mode=max

      - name: Build frontend image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: false
          tags: trademark-frontend:${{ github.sha }}
          cache-from: type=local,src=/tmp/docker-cache/frontend
          cache-to: type=local,dest=/tmp/docker-cache/frontend,mode=max
