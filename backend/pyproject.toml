[tool.ruff]
line-length = 100
target-version = "py311"

[tool.ruff.lint]
select = ["E", "F", "W", "I", "N", "UP", "B", "SIM", "ARG", "PTH", "RUF"]

[tool.ruff.lint.per-file-ignores]
"__init__.py" = ["F401"]
# Prompt template with intentionally long lines sent to the LLM
"app/services/llm_service.py" = ["E501", "RUF001"]
# NICE class descriptions are government-defined data strings, not code
"app/services/text_formatter.py" = ["E501"]

[tool.ruff.format]
quote-style = "double"
indent-style = "space"
line-ending = "lf"
